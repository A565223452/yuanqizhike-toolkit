<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online Base64 batch encoder and decoder. Encode or decode multiple strings at once, supports UTF-8, URL-safe Base64. Runs locally in your browser, no data upload.">

<title>Base64 Batch Encoder / Decoder | YuanqiZhiKe Toolkit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{padding:20px;font-family:system-ui,-apple-system,sans-serif;background:#f7f7f7;transition:background 0.3s,color 0.3s}
body.dark{background:#1a1a2e;color:#e0e0e0}
body.dark .wrap{background:#16213e}
body.dark textarea,body.dark select{background:#0f3460;color:#e0e0e0;border-color:#1a1a2e}
body.dark footer{border-color:#0f3460;color:#a0a0a0}
body.dark .bookmark-btn{background:#16213e;border-color:#0f3460;color:#a0a0a0}
body.dark .bookmark-btn:hover{background:#0f3460}
body.dark .field-label,body.dark .check-label{color:#c8c8c8}
body.dark .out-line{background:#0f3460;border-color:#1a1a2e}
body.dark .out-line.in-error{background:#3a1515;border-color:#5c1f1f}
body.dark .out-line.ok{background:#0f3460}
.wrap{max-width:1000px;margin:0 auto;background:#fff;border-radius:10px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:background 0.3s}
h1{margin-bottom:6px;font-size:24px}
.subtitle{color:#888;font-size:13px;margin-bottom:18px}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.bookmark-btn{padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:13px;transition:all 0.2s}
.bookmark-btn:hover{background:#f0f0f0}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field-label{font-size:13px;font-weight:600;color:#444}
textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-family:monospace;font-size:13px;resize:vertical;transition:background 0.3s,color 0.3s}
.input-area textarea{height:160px}
.options-row{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0 16px;align-items:center}
.check-label{display:flex;align-items:center;gap:6px;font-size:13px;color:#444;cursor:pointer}
select{padding:7px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit;transition:background 0.3s}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.btns button{padding:9px 16px;border:none;border-radius:4px;background:#007bff;color:#fff;cursor:pointer;transition:opacity 0.2s;font-size:14px}
.btns button:hover{opacity:0.85}
.btns button.secondary{background:#6c757d}
.btns button.success{background:#28a745}
.out-list{margin-top:8px;border:1px solid #ddd;border-radius:4px;background:#fafafa;max-height:400px;overflow:auto;transition:background 0.3s}
.out-list:empty{display:none}
.out-line{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #eee;font-family:monospace;font-size:13px;word-break:break-all}
.out-line:last-child{border-bottom:none}
.out-line .idx{flex:0 0 30px;color:#999;text-align:right}
.out-line .val{flex:1;white-space:pre-wrap}
.out-line .copy1{flex:0 0 auto;padding:3px 8px;font-size:11px;background:#6c757d;color:#fff;border:none;border-radius:3px;cursor:pointer}
.out-line.in-error{background:#fff0f0;color:#b00}
.out-line.in-error .val{color:#b00}
.stat{margin-top:10px;font-size:13px;color:#666}
.lead{margin-top:14px;padding:12px;background:#fff8e1;border:1px solid #ffe082;border-radius:6px;font-size:13px;color:#7a5c00;text-align:center}
body.dark .lead{background:#3a2e00;border-color:#5c4400;color:#ffd54f}
footer{margin-top:24px;padding-top:16px;border-top:1px solid #ddd;color:#666;text-align:center;font-size:13px}
footer a{color:#007bff;text-decoration:none}
@media(max-width:768px){
    .wrap{padding:16px}
    .out-line{flex-wrap:wrap}
    .bookmark-btn{position:static;margin-top:8px}
}

/* === Common: theme toggle button + contact modal === */
.theme-toggle-btn{padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:14px;transition:all 0.2s;line-height:1}
.theme-toggle-btn:hover{background:#f0f0f0}
body.dark .theme-toggle-btn{background:#16213e;border-color:#0f3460;color:#a0a0a0}
body.dark .theme-toggle-btn:hover{background:#0f3460}
.lead a.contact-trigger{color:inherit;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;cursor:pointer}
.lead a.contact-trigger:hover{color:#007bff}
body.dark .lead a.contact-trigger:hover{color:#7ab8ff}
.contact-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:9999;justify-content:center;align-items:center;padding:20px}
.contact-modal.open{display:flex}
.contact-modal .box{background:#fff;border-radius:10px;padding:28px;max-width:440px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.2);position:relative;animation:pop .2s ease-out}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
body.dark .contact-modal .box{background:#16213e;color:#e0e0e0;border:1px solid #0f3460}
.contact-modal .close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1;padding:4px}
.contact-modal .close:hover{color:#333}
body.dark .contact-modal .close:hover{color:#fff}
.contact-modal h3{font-size:18px;margin-bottom:6px;font-weight:600}
.contact-modal .desc{font-size:13px;color:#777;margin-bottom:18px;line-height:1.5}
body.dark .contact-modal .desc{color:#a0a0a0}
.contact-modal .email-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f6f8fa;border:1px solid #e1e4e8;border-radius:6px;margin-bottom:12px}
body.dark .contact-modal .email-row{background:#0f3460;border-color:#1a1a2e}
.contact-modal .email-row .ico{font-size:16px}
.contact-modal .email-row .email{font-family:monospace;font-size:14px;flex:1;word-break:break-all;color:#333}
body.dark .contact-modal .email-row .email{color:#e0e0e0}
.contact-modal .email-row .copy-btn{padding:4px 10px;background:#28a745;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;white-space:nowrap}
.contact-modal .email-row .copy-btn:hover{background:#218838}
.contact-modal .mailto-btn{display:block;width:100%;padding:11px;background:#007bff;color:#fff;text-align:center;border:none;border-radius:6px;cursor:pointer;font-size:14px;text-decoration:none;margin-bottom:14px}
.contact-modal .mailto-btn:hover{background:#0069d9}
.contact-modal .form-hint{font-size:12px;color:#999;margin-bottom:8px;text-align:center}
body.dark .contact-modal .form-hint{color:#888}
.contact-modal form{display:flex;flex-direction:column;gap:8px}
.contact-modal input,.contact-modal textarea{padding:9px 12px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit;background:#fff;color:#333}
body.dark .contact-modal input,body.dark .contact-modal textarea{background:#0f3460;border-color:#1a1a2e;color:#e0e0e0}
.contact-modal textarea{min-height:80px;resize:vertical;font-family:inherit}
.contact-modal form button{padding:11px;background:#28a745;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin-top:4px}
.contact-modal form button:hover{background:#218838}
.instructions{margin-top:20px;padding:16px;background:#f0f7ff;border:1px solid #b8daff;border-radius:6px}.instructions h2{font-size:16px;margin-bottom:10px;color:#007bff}.instructions ol,.instructions ul{padding-left:20px;margin:6px 0}.instructions li{margin:4px 0;font-size:13px;line-height:1.6}body.dark .instructions{background:#1e2a3a;border-color:#2c4a6e}body.dark .instructions h2{color:#5ba3f5}
</style>
</head>
<body>
<div class="wrap">
    <div class="top-bar">
        <div>
            <h1>Base64 Batch Encoder / Decoder</h1>
            <div class="subtitle">One input per line. All processing happens locally &#8212; no data upload.</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <button class="theme-toggle-btn" id="themeToggle" title="Toggle light/dark (Ctrl+Shift+T)">🌙</button>
            <button class="bookmark-btn" id="bookmarkBtn">&#9733; Bookmark</button>
        </div>
    </div>

    <div class="input-area">
        <div class="field">
            <label class="field-label" for="inputBox">Input (one item per line)</label>
            <textarea id="inputBox" placeholder="Hello World&#10;YuanqiZhiKe&#10;or paste multi-line content here.></textarea>
        </div>
    </div>

    <div class="options-row">
        <label class="check-label"><input type="radio" name="mode" value="encode" checked> Encode</label>
        <label class="check-label"><input type="radio" name="mode" value="decode"> Decode</label>
        <label class="check-label"><input type="checkbox" id="urlsafe"> URL-safe (-_)</label>
        <label class="check-label"><input type="checkbox" id="utf8" checked> UTF-8</label>
        <label class="check-label"><input type="checkbox" id="trim" checked> Trim whitespace</label>
    </div>

    <div class="btns">
        <button id="process" class="success">Process</button>
        <button id="copyAll" class="secondary">Copy All Results</button>
        <button id="download" class="secondary">Download .txt</button>
        <button id="swap" class="secondary">Swap Input/Output</button>
        <button id="clear" class="secondary">Clear</button>
    </div>

    <div class="out-list" id="outList"></div>
    <div class="stat" id="stat"></div>

    
    <div class="instructions">
        <h2>How to Use</h2>
<ol><li>Enter text or upload files (one per line)</li><li>Choose mode: Encode or Decode</li><li>Click <strong>Process</strong></li><li>Copy or download results</li></ol>
    </div>
    <div class="lead">
        Need custom private tool for your business? <a class="contact-trigger" id="contactTrigger">Contact us for bespoke development</a>
    </div>

    <!-- Contact Modal -->
    <div class="contact-modal" id="contactModal">
        <div class="box">
            <button class="close" id="contactClose" aria-label="Close">×</button>
            <h3>Get in touch</h3>
            <div class="desc">We build custom private tools for your business &#8212; batch processing, internal tools, integrations and more.</div>
            <div class="email-row">
                <span class="ico">📧</span>
                <span class="email" id="contactEmail">contact@yuanqizhike.com</span>
                <button class="copy-btn" id="copyEmail">Copy</button>
            </div>
            <a class="mailto-btn" href="mailto:contact@yuanqizhike.com?subject=Bespoke%20Tool%20Development%20Inquiry">✉️ Send us an email</a>
            <div class="form-hint">&#8212; or describe your need below &#8212;</div>
            <form id="contactForm">
                <input type="text" id="formName" placeholder="Your name" required>
                <input type="email" id="formEmail" placeholder="Your email (so we can reply)" required>
                <textarea id="formDesc" placeholder="Brief description of what you need" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <footer>YuanqiZhiKe Toolkit &#8212; Free Online Tools</footer>
</div>

<script>
(function(){
    // === Common: theme + contact modal ===
    const __themeBtn = document.getElementById('themeToggle');
    function __applyTheme(t){
        document.body.classList.toggle('dark', t === 'dark');
        if(__themeBtn) __themeBtn.textContent = (t === 'dark') ? '☀? : '🌙';
    }
    const __saved = localStorage.getItem('theme');
    if(__saved){
        __applyTheme(__saved);
    } else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){
        __applyTheme('dark');
    } else {
        __applyTheme('light');
    }
    if(__themeBtn){
        __themeBtn.addEventListener('click', () => {
            const next = document.body.classList.contains('dark') ? 'light' : 'dark';
            __applyTheme(next);
            localStorage.setItem('theme', next);
        });
    }
    document.addEventListener('keydown', e => {
        if(e.key === 't' && e.ctrlKey && e.shiftKey){
            e.preventDefault();
            const next = document.body.classList.contains('dark') ? 'light' : 'dark';
            __applyTheme(next);
            localStorage.setItem('theme', next);
        }
    });
    document.getElementById('bookmarkBtn').addEventListener('click', () => alert('Press Ctrl/Cmd + D to bookmark this page.'));

    // Contact modal
    const __modal = document.getElementById('contactModal');
    const __trig = document.getElementById('contactTrigger');
    const __close = document.getElementById('contactClose');
    function __openModal(){ if(__modal) __modal.classList.add('open'); }
    function __closeModal(){ if(__modal) __modal.classList.remove('open'); }
    if(__trig) __trig.addEventListener('click', __openModal);
    if(__close) __close.addEventListener('click', __closeModal);
    if(__modal) __modal.addEventListener('click', e => { if(e.target === __modal) __closeModal(); });
    document.addEventListener('keydown', e => { if(e.key === 'Escape') __closeModal(); });
    const __copyBtn = document.getElementById('copyEmail');
    if(__copyBtn){
        __copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText('contact@yuanqizhike.com').then(() => {
                const old = __copyBtn.textContent;
                __copyBtn.textContent='Copied';
                setTimeout(() => __copyBtn.textContent = old, 1500);
            });
        });
    }
    const __form = document.getElementById('contactForm');
    if(__form){
        __form.addEventListener('submit', e => {
            e.preventDefault();
            const name = document.getElementById('formName').value.trim();
            const email = document.getElementById('formEmail').value.trim();
            const desc = document.getElementById('formDesc').value.trim();
            const subject = encodeURIComponent('Bespoke Tool Development Inquiry');
            const body = encodeURIComponent('Name: ' + name + '\nEmail: ' + email + '\n\nRequirement:\n' + desc);
            window.location.href = 'mailto:contact@yuanqizhike.com?subject=' + subject + '&body=' + body;
        });
    }

    // UTF-8 aware Base64
    function utf8ToBytes(str){
        return new TextEncoder().encode(str);
    }
    function bytesToUtf8(bytes){
        return new TextDecoder().decode(bytes);
    }
    function bytesToBase64(bytes, urlsafe){
        let bin = '';
        const chunk = 0x8000;
        for(let i = 0; i < bytes.length; i += chunk){
            bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        let b64 = btoa(bin);
        if(urlsafe) b64 = b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
        return b64;
    }
    function base64ToBytes(b64, urlsafe){
        let s = b64.trim();
        if(urlsafe){
            s = s.replace(/-/g,'+').replace(/_/g,'/');
            while(s.length % 4) s += '=';
        }
        const bin = atob(s);
        const bytes = new Uint8Array(bin.length);
        for(let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
    }

    function processOne(line){
        const mode = document.querySelector('input[name=mode]:checked').value;
        const urlsafe = document.getElementById('urlsafe').checked;
        const utf8 = document.getElementById('utf8').checked;
        try {
            if(mode === 'encode'){
                const bytes = utf8 ? utf8ToBytes(line) : new Uint8Array(Array.from(line).map(c => c.charCodeAt(0)));
                return { ok: true, val: bytesToBase64(bytes, urlsafe) };
            } else {
                const bytes = base64ToBytes(line, urlsafe);
                return { ok: true, val: utf8 ? bytesToUtf8(bytes) : String.fromCharCode.apply(null, bytes) };
            }
        } catch(err){
            return { ok: false, val: '[Error: ' + err.message + ']' };
        }
    }

    function render(){
        const input = document.getElementById('inputBox').value;
        const trim = document.getElementById('trim').checked;
        const lines = input.split(/\r?\n/);
        const processed = lines.map(l => trim ? l.trim() : l).filter((l, i, arr) => !(trim && l === '' && (i === 0 || i === arr.length - 1)));
        const outList = document.getElementById('outList');
        outList.innerHTML = '';
        let okCount = 0, errCount = 0;
        processed.forEach((line, idx) => {
            const res = processOne(line);
            const div = document.createElement('div');
            div.className = 'out-line ' + (res.ok ? 'ok' : 'in-error');
            div.innerHTML = `<span class="idx">${idx + 1}</span><span class="val"></span><button class="copy1">Copy</button>`;
            div.querySelector('.val').textContent = res.val;
            div.querySelector('.copy1').addEventListener('click', () => {
                navigator.clipboard.writeText(res.val).then(() => {
                    const b = div.querySelector('.copy1');
                    const old = b.textContent;
                    b.textContent = '?;
                    setTimeout(() => b.textContent = old, 1200);
                });
            });
            outList.appendChild(div);
            if(res.ok) okCount++; else errCount++;
        });
        document.getElementById('stat').textContent = processed.length ? `Total: ${processed.length} · Success: ${okCount} · Error: ${errCount}` : '';
    }

    document.getElementById('process').addEventListener('click', render);
    document.getElementById('inputBox').addEventListener('input', () => { /* manual */ });

    document.getElementById('copyAll').addEventListener('click', () => {
        const vals = Array.from(document.querySelectorAll('.out-line .val')).map(v => v.textContent);
        if(!vals.length){ alert('Nothing to copy.'); return; }
        navigator.clipboard.writeText(vals.join('\n')).then(() => {
            const b = document.getElementById('copyAll');
            const old = b.textContent;
            b.textContent = '?Copied';
            setTimeout(() => b.textContent = old, 1500);
        });
    });

    document.getElementById('download').addEventListener('click', () => {
        const vals = Array.from(document.querySelectorAll('.out-line .val')).map(v => v.textContent);
        if(!vals.length){ alert('Nothing to download.'); return; }
        const blob = new Blob([vals.join('\n')], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'base64-result.txt';
        a.click();
        URL.revokeObjectURL(a.href);
    });

    document.getElementById('swap').addEventListener('click', () => {
        const vals = Array.from(document.querySelectorAll('.out-line .val')).map(v => v.textContent);
        if(!vals.length){ alert('Nothing to swap.'); return; }
        document.getElementById('inputBox').value = vals.join('\n');
        // flip mode
        const cur = document.querySelector('input[name=mode]:checked').value;
        const other = cur === 'encode' ? 'decode' : 'encode';
        document.querySelector(`input[name=mode][value="${other}"]`).checked = true;
        render();
    });

    document.getElementById('clear').addEventListener('click', () => {
        document.getElementById('inputBox').value = '';
        document.getElementById('outList').innerHTML = '';
        document.getElementById('stat').textContent = '';
    });

    // auto-run on load
    render();
})();
</script>
